<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeamFlow — Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px #111827; border-color: #111827; }
    .member-chip { display:inline-flex; align-items:center; gap:4px; background:#f3f4f6; border-radius:999px; padding:3px 10px 3px 8px; font-size:12px; color:#374151; border:1px solid #e5e7eb; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-xl font-semibold text-gray-900">Projects</h1>
        <p class="text-sm text-gray-500 mt-0.5">Manage your team's projects and tasks.</p>
      </div>
      <button onclick="openModal()" id="btn-new-project"
        class="hidden inline-flex items-center gap-2 bg-gray-900 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-800 active:scale-[0.99] transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Project
      </button>
    </div>

    <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      ${[...Array(3)].map(() => `<div class="bg-white border border-gray-200 rounded-xl p-6 animate-pulse"><div class="h-4 bg-gray-100 rounded w-3/4 mb-3"></div><div class="h-3 bg-gray-100 rounded w-full mb-2"></div><div class="h-3 bg-gray-100 rounded w-2/3"></div></div>`).join('')}
    </div>
  </main>

  <!-- Project Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-25 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 class="text-base font-semibold text-gray-900" id="modal-title">New Project</h2>
        <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Project Name <span class="text-red-400">*</span></label>
          <input type="text" id="proj-name" placeholder="e.g. Website Redesign"
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 transition-all"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Description</label>
          <textarea id="proj-desc" rows="2" placeholder="What is this project about?"
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 transition-all resize-none"></textarea>
        </div>
        <div id="member-select-section">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Assign Members</label>
          <div class="border border-gray-200 rounded-xl overflow-hidden max-h-44 overflow-y-auto" id="members-checkboxes">
            <div class="px-4 py-3 text-xs text-gray-400 flex items-center gap-2">
              <div class="w-3 h-3 border-2 border-gray-200 border-t-gray-400 rounded-full animate-spin"></div>
              Loading members...
            </div>
          </div>
          <div id="selected-chips" class="flex flex-wrap gap-1.5 mt-2 min-h-0"></div>
        </div>
        <div id="modal-error" class="hidden flex items-center gap-2 p-3 bg-red-50 border border-red-100 rounded-xl">
          <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <p id="modal-error-text" class="text-xs text-red-600"></p>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t border-gray-100 bg-gray-50">
        <button onclick="closeModal()" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-white transition-colors">Cancel</button>
        <button onclick="saveProject()" id="btn-save" class="flex-1 px-4 py-2.5 bg-gray-900 text-white rounded-xl text-sm font-medium hover:bg-gray-800 active:scale-[0.99] transition-all">Create Project</button>
      </div>
    </div>
  </div>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    requireAuth();
    renderNavbar('projects');

    const isAdmin = api.getUser()?.role === 'admin';
    if (isAdmin) document.getElementById('btn-new-project').classList.remove('hidden');

    let editingId = null;
    let allUsers = [];
    let selectedMemberIds = new Set();

    async function loadUsers() {
      try {
        const users = await api.get('/auth/users');
        allUsers = users.filter(u => u.role !== 'admin');
      } catch (e) { allUsers = []; }
    }

    async function loadProjects() {
      try {
        const projects = await api.get('/projects/');
        renderProjects(projects);
      } catch (e) { showToast(e.message, 'error'); }
    }

    function renderProjects(projects) {
      if (!projects.length) {
        document.getElementById('projects-grid').innerHTML = `
          <div class="col-span-3 flex flex-col items-center justify-center py-20">
            <div class="w-14 h-14 bg-white border border-gray-200 rounded-2xl flex items-center justify-center mb-4 shadow-sm">
              <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            </div>
            <p class="text-sm font-semibold text-gray-900">No projects yet</p>
            <p class="text-sm text-gray-400 mt-1 mb-4">${isAdmin ? 'Create your first project to get started.' : 'You have not been added to any projects yet.'}</p>
            ${isAdmin ? `<button onclick="openModal()" class="inline-flex items-center gap-2 bg-gray-900 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-800 transition-all">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Create Project</button>` : ''}
          </div>`;
        return;
      }
      document.getElementById('projects-grid').innerHTML = projects.map(p => `
        <div class="bg-white border border-gray-200 rounded-xl p-5 hover:border-gray-300 hover:shadow-sm transition-all cursor-pointer group relative"
             onclick="window.location.href='/project-detail.html?id=${p.id}'">
          <div class="flex items-start justify-between mb-4">
            <div class="w-9 h-9 bg-gray-100 rounded-xl flex items-center justify-center">
              <span class="text-sm font-bold text-gray-600">${p.name[0].toUpperCase()}</span>
            </div>
            ${isAdmin ? `
            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
              <button onclick="event.stopPropagation(); openEditModal('${p.id}','${esc(p.name)}','${esc(p.description||'')}')"
                class="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button onclick="event.stopPropagation(); deleteProject('${p.id}','${esc(p.name)}')"
                class="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>` : ''}
          </div>
          <h3 class="text-sm font-semibold text-gray-900 mb-1 truncate">${p.name}</h3>
          <p class="text-xs text-gray-400 mb-4 line-clamp-2 min-h-[2rem]">${p.description || 'No description provided'}</p>
          <div class="flex items-center gap-4 text-xs text-gray-400 pt-3 border-t border-gray-100">
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              ${p.member_count} member${p.member_count !== 1 ? 's' : ''}
            </span>
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
              ${p.task_count} task${p.task_count !== 1 ? 's' : ''}
            </span>
            <span class="ml-auto truncate">by ${p.owner_name}</span>
          </div>
        </div>`).join('');
    }

    function esc(str) { return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

    function renderMemberCheckboxes() {
      if (!allUsers.length) {
        document.getElementById('members-checkboxes').innerHTML = '<div class="px-4 py-4 text-xs text-gray-400 text-center">No members registered yet</div>';
        return;
      }
      document.getElementById('members-checkboxes').innerHTML = allUsers.map(u => `
        <label class="flex items-center gap-3 px-4 py-2.5 hover:bg-gray-50 cursor-pointer border-b border-gray-50 last:border-0">
          <input type="checkbox" value="${u.id}" onchange="toggleMember('${u.id}','${esc(u.name)}')"
            class="w-4 h-4 rounded border-gray-300 text-gray-900 accent-gray-900" ${selectedMemberIds.has(u.id) ? 'checked' : ''}/>
          <div class="flex items-center gap-2 min-w-0">
            <div class="w-6 h-6 bg-gray-200 rounded-full flex items-center justify-center flex-shrink-0">
              <span class="text-gray-600 text-xs font-medium">${u.name[0].toUpperCase()}</span>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">${u.name}</p>
              <p class="text-xs text-gray-400 truncate">${u.email}</p>
            </div>
          </div>
        </label>`).join('');
    }

    function toggleMember(id, name) {
      if (selectedMemberIds.has(id)) selectedMemberIds.delete(id);
      else selectedMemberIds.add(id);
      renderChips();
    }

    function renderChips() {
      const chips = document.getElementById('selected-chips');
      const selected = allUsers.filter(u => selectedMemberIds.has(u.id));
      chips.innerHTML = selected.map(u => `
        <span class="member-chip">
          <span class="w-4 h-4 bg-gray-400 rounded-full inline-flex items-center justify-center text-white text-xs">${u.name[0].toUpperCase()}</span>
          ${u.name.split(' ')[0]}
          <button onclick="removeMemberChip('${u.id}')" class="text-gray-400 hover:text-gray-600 ml-0.5 leading-none">×</button>
        </span>`).join('');
    }

    function removeMemberChip(id) {
      selectedMemberIds.delete(id);
      renderChips();
      renderMemberCheckboxes();
    }

    async function openModal() {
      editingId = null;
      selectedMemberIds = new Set();
      document.getElementById('modal-title').textContent = 'New Project';
      document.getElementById('proj-name').value = '';
      document.getElementById('proj-desc').value = '';
      document.getElementById('btn-save').textContent = 'Create Project';
      document.getElementById('modal-error').classList.add('hidden');
      document.getElementById('member-select-section').classList.remove('hidden');
      document.getElementById('selected-chips').innerHTML = '';
      document.getElementById('modal').classList.remove('hidden');
      await loadUsers();
      renderMemberCheckboxes();
      setTimeout(() => document.getElementById('proj-name').focus(), 100);
    }

    function openEditModal(id, name, desc) {
      editingId = id;
      document.getElementById('modal-title').textContent = 'Edit Project';
      document.getElementById('proj-name').value = name;
      document.getElementById('proj-desc').value = desc;
      document.getElementById('btn-save').textContent = 'Save Changes';
      document.getElementById('modal-error').classList.add('hidden');
      document.getElementById('member-select-section').classList.add('hidden');
      document.getElementById('modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('proj-name').focus(), 100);
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function saveProject() {
      const name = document.getElementById('proj-name').value.trim();
      const desc = document.getElementById('proj-desc').value.trim();
      const btn = document.getElementById('btn-save');
      if (!name) {
        document.getElementById('modal-error-text').textContent = 'Project name is required';
        document.getElementById('modal-error').classList.remove('hidden');
        document.getElementById('proj-name').focus();
        return;
      }
      document.getElementById('modal-error').classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = `<svg class="w-4 h-4 animate-spin mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;
      try {
        if (editingId) {
          await api.put(`/projects/${editingId}`, { name, description: desc });
          showToast('Project updated successfully');
        } else {
          await api.post('/projects/', { name, description: desc, member_ids: [...selectedMemberIds] });
          showToast('Project created successfully');
        }
        closeModal();
        loadProjects();
      } catch (e) {
        document.getElementById('modal-error-text').textContent = e.message;
        document.getElementById('modal-error').classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = editingId ? 'Save Changes' : 'Create Project';
      }
    }

    function deleteProject(id, name) {
      showConfirm(`This will permanently delete <strong>${name}</strong> and all its tasks. This cannot be undone.`, async () => {
        try {
          await api.delete(`/projects/${id}`);
          showToast('Project deleted');
          loadProjects();
        } catch (e) { showToast(e.message, 'error'); }
      }, { title: 'Delete project?', confirmText: 'Delete', danger: true });
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    loadProjects();
  </script>
</body>
</html>
