<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeamFlow — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    input:focus { outline: none; box-shadow: 0 0 0 2px #111827; border-color: #111827; }
    select:focus { outline: none; box-shadow: 0 0 0 2px #111827; border-color: #111827; }
    .tab-active { border-bottom: 2px solid #111827; color: #111827; font-weight: 500; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #9ca3af; }
    .tab-inactive:hover { color: #6b7280; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2.5 mb-4">
        <div class="w-9 h-9 bg-gray-900 rounded-xl flex items-center justify-center shadow-sm">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
        </div>
        <span class="text-2xl font-semibold text-gray-900 tracking-tight">TeamFlow</span>
      </div>
      <p class="text-sm text-gray-500">Collaborate, assign, and ship together.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="flex border-b border-gray-200 px-6 pt-6 gap-6">
        <button id="tab-login" onclick="switchTab('login')" class="pb-3 text-sm transition-all tab-active">Sign In</button>
        <button id="tab-register" onclick="switchTab('register')" class="pb-3 text-sm transition-all tab-inactive">Create Account</button>
      </div>

      <div class="p-6">
        <!-- Login -->
        <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Email</label>
            <input type="email" id="login-email" required placeholder="you@company.com"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 transition-all"/>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Password</label>
            <div class="relative">
              <input type="password" id="login-password" required placeholder="••••••••"
                class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 transition-all pr-10"/>
              <button type="button" onclick="togglePwd('login-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
          <div id="login-error" class="hidden flex items-center gap-2 p-3 bg-red-50 border border-red-100 rounded-lg">
            <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p id="login-error-text" class="text-xs text-red-600"></p>
          </div>
          <button type="submit" id="btn-login"
            class="w-full bg-gray-900 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-gray-800 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
            Sign In
          </button>
          <p class="text-center text-xs text-gray-400">Default admin: admin@gmail.com / 123</p>
        </form>

        <!-- Register -->
        <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4 hidden">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Full Name</label>
            <input type="text" id="reg-name" required placeholder="Jane Smith"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 transition-all"/>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Email</label>
            <input type="email" id="reg-email" required placeholder="you@company.com"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 transition-all"/>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">Password</label>
            <div class="relative">
              <input type="password" id="reg-password" required placeholder="Min. 6 characters"
                class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 transition-all pr-10"/>
              <button type="button" onclick="togglePwd('reg-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
          <div id="reg-error" class="hidden flex items-center gap-2 p-3 bg-red-50 border border-red-100 rounded-lg">
            <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p id="reg-error-text" class="text-xs text-red-600"></p>
          </div>
          <button type="submit" id="btn-register"
            class="w-full bg-gray-900 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-gray-800 active:scale-[0.99] transition-all">
            Create Account
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-xs text-gray-400 mt-6">© 2025 TeamFlow</p>
  </div>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (api.isLoggedIn()) window.location.href = '/dashboard.html';

    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').className = `pb-3 text-sm transition-all ${isLogin ? 'tab-active' : 'tab-inactive'}`;
      document.getElementById('tab-register').className = `pb-3 text-sm transition-all ${!isLogin ? 'tab-active' : 'tab-inactive'}`;
    }

    function showFormError(errorId, textId, msg) {
      document.getElementById(textId).textContent = msg;
      document.getElementById(errorId).classList.remove('hidden');
    }
    function hideFormError(errorId) { document.getElementById(errorId).classList.add('hidden'); }

    async function handleLogin(e) {
      e.preventDefault();
      hideFormError('login-error');
      const btn = document.getElementById('btn-login');
      btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Signing in...`;
      btn.disabled = true;
      try {
        const data = await api.post('/auth/login', {
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        });
        api.setAuth(data.access_token, data.user);
        window.location.href = '/dashboard.html';
      } catch (ex) {
        showFormError('login-error', 'login-error-text', ex.message);
        btn.innerHTML = 'Sign In';
        btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideFormError('reg-error');
      const btn = document.getElementById('btn-register');
      btn.innerHTML = `<svg class="w-4 h-4 animate-spin mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;
      btn.disabled = true;
      try {
        const data = await api.post('/auth/register', {
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
        });
        api.setAuth(data.access_token, data.user);
        window.location.href = '/dashboard.html';
      } catch (ex) {
        showFormError('reg-error', 'reg-error-text', ex.message);
        btn.innerHTML = 'Create Account';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
